name: Monitor pltxt2htm WASM XSS surface

on:
  schedule:
    - cron: '0 14 */3 * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  xss-monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run automated XSS monitor against latest upstream release
        env:
          MAX_PAYLOADS: '1500'
        run: node scripts/security/pltxt2htm-xss-check.mjs
